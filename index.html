<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RulzzDownloader - Real Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0D0D1A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #6C3CE1, #E9405F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .logo span { font-size: 3rem; -webkit-text-fill-color: initial; }
        .subtitle {
            text-align: center;
            color: #A0A0B8;
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            min-width: 200px;
        }
        .input-group input:focus {
            border-color: #6C3CE1;
        }
        .btn-download {
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #6C3CE1, #E9405F);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-download:hover { transform: scale(1.05); }
        .result-area {
            margin-top: 25px;
            display: none;
        }
        .result-area.show { display: block; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .result-item .thumb {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .result-item .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .result-item .info { flex: 1; }
        .result-item .info .title { font-weight: 600; }
        .result-item .info .meta { font-size: 0.85rem; color: #A0A0B8; }
        .result-item .download-btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: none;
            background: #FF6B6B;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .result-item .download-btn:hover { transform: scale(1.05); }
        .progress-wrapper {
            margin-top: 15px;
            display: none;
        }
        .progress-wrapper.show { display: block; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6C3CE1, #E9405F);
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            font-size: 0.85rem;
            color: #A0A0B8;
            margin-top: 5px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .features .item {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .features .item .icon { font-size: 1.8rem; }
        .features .item .label { font-size: 0.8rem; color: #A0A0B8; }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #A0A0B8;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .logo { font-size: 1.8rem; }
            .input-group { flex-direction: column; }
            .btn-download { width: 100%; justify-content: center; }
            .result-item { flex-wrap: wrap; }
            .result-item .download-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>🔥</span> RulzzDownloader</div>
        <p class="subtitle">Download Video & Foto dari TikTok, Instagram, YouTube & lainnya</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Tempelkan URL di sini...">
            <button class="btn-download" id="downloadBtn">⬇️ Proses</button>
        </div>

        <div class="result-area" id="resultArea">
            <div id="resultContainer"></div>
            <div class="progress-wrapper" id="progressWrapper">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">Mengunduh ... 0%</div>
            </div>
        </div>

        <div class="features">
            <div class="item"><div class="icon">⚡</div><div class="label">Cepat</div></div>
            <div class="item"><div class="icon">🖼️</div><div class="label">Foto & Video</div></div>
            <div class="item"><div class="icon">🔒</div><div class="label">Aman</div></div>
            <div class="item"><div class="icon">🎯</div><div class="label">Tanpa Watermark</div></div>
        </div>

        <div class="footer">© 2026 RulzzDownloader — Dibangun dengan 🔥 oleh RulzzXZX</div>
    </div>

    <script>
        // ==========================================================
        // API GRATIS UNTUK DOWNLOAD
        // ==========================================================
        
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultArea = document.getElementById('resultArea');
        const resultContainer = document.getElementById('resultContainer');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        // API Downloader Gratis (pake API pihak ketiga)
        const API_URL = 'https://api.tikmate.app/api/lookup?url=';

        downloadBtn.addEventListener('click', async function() {
            const url = urlInput.value.trim();
            if (!url) {
                urlInput.style.borderColor = '#FF6B6B';
                urlInput.placeholder = '⚠️ Masukkan URL dulu, KONTOL!';
                setTimeout(() => {
                    urlInput.style.borderColor = '';
                    urlInput.placeholder = 'Tempelkan URL di sini...';
                }, 2000);
                return;
            }

            // Tampilkan loading
            this.textContent = '⏳ Memproses...';
            this.disabled = true;

            try {
                // Coba ambil data dari API
                const response = await fetch(API_URL + encodeURIComponent(url));
                const data = await response.json();

                if (data && data.video_url) {
                    showResult(data);
                } else {
                    // Fallback: pake metode lain
                    fallbackDownload(url);
                }
            } catch (error) {
                // Kalo API error, pake fallback
                fallbackDownload(url);
            }

            this.textContent = '⬇️ Proses';
            this.disabled = false;
        });

        function showResult(data) {
            resultArea.classList.add('show');
            resultContainer.innerHTML = '';

            // Tampilkan video
            if (data.video_url) {
                const item = createResultItem(
                    '🎬',
                    'Video',
                    data.author || 'Unknown',
                    data.video_url,
                    'video'
                );
                resultContainer.appendChild(item);
            }

            // Tampilkan gambar (jika ada)
            if (data.thumbnail) {
                const item = createResultItem(
                    '🖼️',
                    'Foto/Thumbnail',
                    data.author || 'Unknown',
                    data.thumbnail,
                    'image'
                );
                resultContainer.appendChild(item);
            }

            // Scroll ke hasil
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function createResultItem(icon, title, author, downloadUrl, type) {
            const div = document.createElement('div');
            div.className = 'result-item';
            
            // Thumbnail
            const thumb = document.createElement('div');
            thumb.className = 'thumb';
            if (type === 'image' && downloadUrl) {
                thumb.innerHTML = `<img src="${downloadUrl}" alt="thumbnail" onerror="this.innerHTML='🖼️'">`;
            } else {
                thumb.textContent = icon;
            }
            
            // Info
            const info = document.createElement('div');
            info.className = 'info';
            info.innerHTML = `
                <div class="title">${title}</div>
                <div class="meta">${author} · Klik Unduh untuk download</div>
            `;
            
            // Tombol Download
            const btn = document.createElement('button');
            btn.className = 'download-btn';
            btn.textContent = '⬇️ Unduh';
            btn.addEventListener('click', function() {
                if (downloadUrl) {
                    startDownload(downloadUrl, type);
                } else {
                    alert('Link download tidak tersedia!');
                }
            });
            
            div.appendChild(thumb);
            div.appendChild(info);
            div.appendChild(btn);
            return div;
        }

        function startDownload(url, type) {
            // Tampilkan progress
            progressWrapper.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '⏳ Memulai download...';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10 + 3;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    progressText.textContent = '✅ Download selesai!';
                    
                    // Trigger download
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.download = type === 'video' ? 'video.mp4' : 'foto.jpg';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    setTimeout(() => {
                        progressWrapper.classList.remove('show');
                        progressFill.style.width = '0%';
                    }, 2000);
                }
                progressFill.style.width = progress + '%';
                progressText.textContent = `⏳ Mengunduh ... ${Math.floor(progress)}%`;
            }, 200);
        }

        // ==========================================================
        // FALLBACK - PAKE IFRAME UNTUK DOWNLOAD
        // ==========================================================

        function fallbackDownload(url) {
            resultArea.classList.add('show');
            resultContainer.innerHTML = `
                <div class="result-item">
                    <div class="thumb">📥</div>
                    <div class="info">
                        <div class="title">Download Manual</div>
                        <div class="meta">API tidak merespon, coba buka link ini:</div>
                    </div>
                    <button class="download-btn" onclick="window.open('${url}', '_blank')">🔗 Buka Link</button>
                </div>
                <div style="padding:15px; background:rgba(255,107,107,0.1); border-radius:12px; margin-top:10px; font-size:0.9rem; color:#FF6B6B;">
                    ⚠️ Gunakan fitur bawaan browser untuk download dari link tersebut.
                </div>
            `;
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Enter key
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') downloadBtn.click();
        });

        console.log('%c 🔥 RulzzDownloader - Real Download 🔥', 'font-size:20px; font-weight:bold; color:#6C3CE1;');
        console.log('%c API: https://api.tikmate.app/api/lookup?url=', 'font-size:12px; color:#A0A0B8;');
    </script>
</body>
</html>
